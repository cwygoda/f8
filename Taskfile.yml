version: '3'

silent: false

tasks:
  install:
    desc: Install project dependencies
    cmds:
      - pnpm install

  lint:
    desc: Run ESLint and Prettier checks
    cmds:
      - pnpm lint

  test:
    desc: Run unit and browser tests
    cmds:
      - pnpm test

  test:e2e:
    desc: Run Playwright tests across required viewports
    cmds:
      - pnpm test:e2e

  build:
    desc: Build the SvelteKit app and package artifacts
    cmds:
      - pnpm build

  check:
    desc: Run the release-readiness quality gate
    cmds:
      - pnpm lint
      - pnpm check
      - pnpm test
      - pnpm build
      - pnpm consumer:check

  quality:
    desc: Alias for the complete quality gate
    cmds:
      - task: check
