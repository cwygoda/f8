name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: npmjs
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Ensure this CI run is still current main
        id: current
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --tags --force
          if [ "${{ github.event.workflow_run.head_sha }}" != "$(git rev-parse origin/main)" ]; then
            echo "main moved after this CI run; a newer CI run will handle the release."
            echo "current=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "current=true" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: steps.current.outputs.current == 'true'
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        if: steps.current.outputs.current == 'true'
        with:
          node-version: 24
          cache: pnpm
      - if: steps.current.outputs.current == 'true'
        run: pnpm install --frozen-lockfile

      - name: Create release commit, tag, and GitHub Release
        if: steps.current.outputs.current == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME: f8-release-bot
          GIT_AUTHOR_EMAIL: f8-release-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: f8-release-bot
          GIT_COMMITTER_EMAIL: f8-release-bot@users.noreply.github.com
        run: pnpm exec semantic-release
